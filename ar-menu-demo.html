<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>AR Menü</title>

<!-- A-Frame önce, MindAR sonra -->
<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }

/* Kamera video her zaman arkada */
video {
  position: fixed !important;
  top: 0 !important; left: 0 !important;
  width: 100% !important; height: 100% !important;
  object-fit: cover !important;
  z-index: 0 !important;
}
canvas.a-canvas {
  position: fixed !important;
  top: 0 !important; left: 0 !important;
  width: 100% !important; height: 100% !important;
  z-index: 1 !important;
  background: transparent !important;
}
a-scene {
  position: fixed !important;
  top: 0 !important; left: 0 !important;
  width: 100% !important; height: 100% !important;
  z-index: 1 !important;
}

/* SPLASH */
#splash {
  position: fixed; inset: 0; z-index: 999;
  background: #0d0b08;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 40px 32px;
  transition: opacity 0.5s ease;
  font-family: -apple-system, sans-serif;
}
#splash.hide { opacity: 0; pointer-events: none; }

.logo { font-size: 30px; font-weight: 700; color: #f5ede0; letter-spacing: 2px; margin-bottom: 6px; }
.logo span { color: #c8933a; }
.tagline { font-size: 12px; color: #666; margin-bottom: 44px; letter-spacing: 1px; }

.pizza-emoji {
  font-size: 78px; display: block; margin-bottom: 28px;
  animation: float 3s ease-in-out infinite;
}
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }

.steps {
  list-style: none; width: 100%; max-width: 300px;
  margin-bottom: 32px; display: flex; flex-direction: column; gap: 10px;
}
.steps li {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 12px; padding: 12px 16px;
  font-size: 13px; color: #ccc;
  display: flex; align-items: center; gap: 12px;
}
.steps li .n {
  width: 22px; height: 22px; border-radius: 50%;
  background: #c8933a; color: #000;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; flex-shrink: 0;
}

/* Buton başta disabled - sahne yüklenince aktif olur */
#startBtn {
  width: 100%; max-width: 300px;
  background: #555; color: #999;
  border: none; border-radius: 50px;
  padding: 16px; font-size: 16px; font-weight: 700;
  cursor: default; transition: background 0.3s, color 0.3s;
  font-family: -apple-system, sans-serif;
}
#startBtn.ready {
  background: #c8933a; color: #000; cursor: pointer;
}

.loading-label {
  margin-top: 12px; font-size: 12px; color: #555;
  font-family: -apple-system, sans-serif;
}
.dot { animation: blink 1.2s ease-in-out infinite; }
.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes blink { 0%,80%,100%{opacity:0.2} 40%{opacity:1} }

/* HUD */
#hud {
  position: fixed; top: 0; left: 0; right: 0;
  z-index: 100; display: none;
  justify-content: space-between; align-items: center;
  padding: 52px 20px 16px;
  background: linear-gradient(to bottom, rgba(0,0,0,0.55), transparent);
  font-family: -apple-system, sans-serif;
}
#hud.show { display: flex; }
#hud .brand { font-size: 18px; font-weight: 700; color: #fff; }
#hud .brand span { color: #c8933a; }
#hud .hint {
  font-size: 12px; color: rgba(255,255,255,0.85);
  background: rgba(0,0,0,0.45); border-radius: 20px; padding: 6px 14px;
}

/* Scan prompt */
#scanPrompt {
  position: fixed; bottom: 60px;
  left: 50%; transform: translateX(-50%);
  z-index: 100; display: none;
  background: rgba(0,0,0,0.75);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 16px; padding: 14px 28px;
  color: #fff; font-size: 14px;
  white-space: nowrap;
  font-family: -apple-system, sans-serif;
  animation: pulse 2s ease-in-out infinite;
}
#scanPrompt.show { display: block; }
@keyframes pulse { 0%,100%{opacity:0.7} 50%{opacity:1} }
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <div class="logo">AR<span>Menü</span></div>
  <div class="tagline">Yemeği siparişten önce gör</div>
  <span class="pizza-emoji">🍕</span>
  <ul class="steps">
    <li><span class="n">1</span> Kamera iznine izin ver</li>
    <li><span class="n">2</span> Menü kapağına doğrult</li>
    <li><span class="n">3</span> 3D yemek masanda belirir</li>
  </ul>
  <button id="startBtn" disabled>Yükleniyor<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span></button>
  <div class="loading-label" id="loadingLabel">AR motoru hazırlanıyor</div>
</div>

<!-- HUD -->
<div id="hud">
  <div class="brand">AR<span>Menü</span></div>
  <div class="hint" id="hudHint">📸 Menüye doğrult</div>
</div>

<!-- Scan prompt -->
<div id="scanPrompt">🔍 Menü kapağını kameraya göster</div>

<!-- A-FRAME — autoStart:false, arka planda yüklensin -->
<a-scene
  id="arScene"
  mindar-image="imageTargetSrc: https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.1.4/examples/image-tracking/assets/card-example/card.mind; autoStart: false; uiLoading: no; uiError: no; uiScanning: no;"
  renderer="colorManagement: true; alpha: true;"
  embedded
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false"
>
  <a-assets>
    <a-asset-item id="pizzaModel" src="https://farfromuk.github.io/sofra-ar/pizza.glb"></a-asset-item>
  </a-assets>

  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
  <a-light type="ambient"     color="#ffffff" intensity="1.0"></a-light>
  <a-light type="directional" color="#ffffff" intensity="1.2" position="1 2 1"></a-light>
  <a-light type="directional" color="#ffe8cc" intensity="0.6" position="-1 1 -1"></a-light>

  <a-entity mindar-image-target="targetIndex: 0">

    <!-- Gerçek GLB model -->
    <a-entity
      gltf-model="#pizzaModel"
      position="0 0.05 0"
      scale="0.4 0.4 0.4"
      rotation="-90 0 0"
      animation="property: rotation; to: -90 360 0; loop: true; dur: 10000; easing: linear">
    </a-entity>

    <!-- Fiyat etiketi -->
    <a-entity position="0 0.55 0"
      animation="property: position; to: 0 0.62 0; loop: true; dur: 2000; dir: alternate; easing: easeInOutSine">
      <a-plane width="0.67" height="0.28" color="#c8933a" opacity="0.5" position="0 0 -0.002"></a-plane>
      <a-plane width="0.65" height="0.26" color="#0d0b08" opacity="0.92" position="0 0 -0.001"></a-plane>
      <a-text value="Brokoli Pizza" align="center" color="#f5ede0" width="1.4"
        font="https://cdn.aframe.io/fonts/Exo2Bold.fnt" position="0 0.05 0.001"></a-text>
      <a-text value="299 TL" align="center" color="#c8933a" width="1.8"
        font="https://cdn.aframe.io/fonts/Exo2Bold.fnt" position="0 -0.05 0.001"></a-text>
    </a-entity>

    <!-- Buhar -->
    <a-sphere position=" 0.03 0.18 0" radius="0.020" color="#fff" opacity="0.20"
      animation    ="property: position; from:  0.03 0.18 0; to:  0.05 0.45 0; loop: true; dur: 2000; easing: easeInSine"
      animation__op="property: opacity;  from: 0.20; to: 0; loop: true; dur: 2000"></a-sphere>
    <a-sphere position="-0.04 0.18 0" radius="0.016" color="#fff" opacity="0.18"
      animation    ="property: position; from: -0.04 0.18 0; to: -0.07 0.42 0; loop: true; dur: 2600; delay: 700; easing: easeInSine"
      animation__op="property: opacity;  from: 0.18; to: 0; loop: true; dur: 2600; delay: 700"></a-sphere>

  </a-entity>
</a-scene>

<script>
(function () {
  const arScene    = document.getElementById('arScene');
  const splash     = document.getElementById('splash');
  const startBtn   = document.getElementById('startBtn');
  const loadLabel  = document.getElementById('loadingLabel');
  const hud        = document.getElementById('hud');
  const hudHint    = document.getElementById('hudHint');
  const scanPrompt = document.getElementById('scanPrompt');

  // Sahne yüklenince butonu aktif et
  const onLoaded = () => {
    startBtn.disabled = false;
    startBtn.classList.add('ready');
    startBtn.innerHTML = '📷 Kamerayı Aç';
    loadLabel.style.display = 'none';
  };

  if (arScene.hasLoaded) {
    onLoaded();
  } else {
    arScene.addEventListener('loaded', onLoaded, { once: true });
  }

  // KRITIK: tıklama handler'ı senkron — iOS getUserMedia direkt tetiklenmeli
  startBtn.addEventListener('click', function () {
    if (!startBtn.classList.contains('ready')) return;

    // Splash kapat
    splash.classList.add('hide');

    // Sistemi DOĞRUDAN başlat — async yok, timeout yok
    const sys = arScene.systems['mindar-image-system'];
    if (sys) {
      sys.start();
      hud.classList.add('show');
      scanPrompt.classList.add('show');
    }
  });

  arScene.addEventListener('targetFound', () => {
    scanPrompt.classList.remove('show');
    hudHint.textContent = '✅ Yemek hazır!';
  });

  arScene.addEventListener('targetLost', () => {
    scanPrompt.classList.add('show');
    hudHint.textContent = '📸 Menüye doğrult';
  });
})();
</script>
</body>
</html>
